<div class="flex flex-col relative w-full h-full min-h-[16rem] bg-white rounded-2xl p-6 shadow-sm border border-gray-100 overflow-hidden transition-all duration-300 hover:-translate-y-1 hover:shadow-xl hover:border-transparent group" *ngIf="item">
  <div class="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-primary to-purple-500 opacity-0 transition-opacity duration-300 group-hover:opacity-100"></div>
  
  <div class="flex items-start justify-between mb-5">
    <img src="assets/credito.JPG" class="w-14 h-14 object-cover rounded-xl shadow-sm" alt="crédito" />
    <a href="#" class="text-[0.85rem] font-semibold text-primary bg-indigo-50 px-3 py-1.5 rounded-full whitespace-nowrap z-10 transition-colors duration-150 hover:bg-primary hover:text-white no-underline">Ver Detalle &gt;</a>
  </div>
  
  <div class="flex-1 flex flex-col p-0">
    <h5 class="text-[1.15rem] font-extrabold text-gray-900 mb-3 tracking-tight">{{ item.accountInformation.productType | nproducts }}</h5>
    <p class="text-[0.875rem] text-gray-500 mb-2">Nro. {{ item.id }}</p>
    <p class="text-[0.875rem] text-gray-500 mb-2">
      Estado:
      <span [class.text-red-500]="item.locked" [class.text-green-500]="!item.locked" class="ml-1">
        <strong>{{ item.locked ? 'Bloqueado' : 'Activo' }}</strong>
      </span>
    </p>
    <p class="text-[0.875rem] text-gray-400 italic mt-auto" *ngIf="item.locked">
      Este producto se encuentra bloqueado. Contacta a tu entidad para más información.
    </p>
  </div>
</div>

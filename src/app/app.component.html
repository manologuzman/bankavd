<div class="app-shell">
  <aside class="app-sidebar">
    <app-menu></app-menu>
  </aside>

  <div class="app-main">
    <main role="main" class="app-content">
      <app-header></app-header>

      <div class="m_productos products-filter">
        <div class="custom-control custom-checkbox">
          <input type="checkbox"
            [(ngModel)]="mostrarOtros"
            (ngModelChange)="onToggleOtros()"
            class="custom-control-input"
            id="customCheck1">
          <label class="custom-control-label" for="customCheck1">Mostrar otros productos</label>
        </div>
      </div>

      <div class="finance-summary shadow-sm">
        <p class="finance-summary__title mb-0">¿Cómo se ven tus finanzas?</p>
        <div class="finance-summary__total">
          <span class="finance-summary__label">En productos de Ahorro tienes:</span>
          <span class="finance-summary__amount">{{ totalAhorro | currency:'COP':'symbol-narrow':'1.2-2' }}</span>
        </div>
      </div>

      <div class="products-grid">
        <ng-container *ngFor="let item of productosVisibles">
          <app-card-deposit-account [item]="item"
            *ngIf="item.accountInformation.productType==='DEPOSIT_ACCOUNT'">
          </app-card-deposit-account>

          <app-card-certified-deposit-term [item]="item"
            *ngIf="item.accountInformation.productType==='CERTIFIED_DEPOSIT_TERM'">
          </app-card-certified-deposit-term>

          <app-card-credit [item]="item"
            *ngIf="item.accountInformation.productType==='CREDIT'">
          </app-card-credit>

          <app-card-credit-card [item]="item"
            *ngIf="item.accountInformation.productType==='CREDIT_CARD'">
          </app-card-credit-card>

          <app-card-current-account [item]="item"
            *ngIf="item.accountInformation.productType==='CURRENT_ACCOUNT'">
          </app-card-current-account>
        </ng-container>
      </div>

      <div class="app-offers">
        <app-footer></app-footer>
      </div>
    </main>

    <footer class="app-brand-bar shadow-sm">
      <p class="mb-0"><b>@Banco</b></p>
    </footer>
  </div>
</div>

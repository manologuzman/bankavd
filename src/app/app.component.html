<div class="flex flex-col lg:flex-row min-h-screen items-stretch">
  <aside class="flex-none lg:w-[260px] bg-white border-b lg:border-b-0 lg:border-r border-gray-200 z-10">
    <app-menu></app-menu>
  </aside>

  <div class="flex-1 flex flex-col min-w-0">
    <main role="main" class="flex-1 p-5 lg:p-8 max-w-[1400px] w-full mx-auto">
      <app-header></app-header>

      <div class="my-6 flex items-center">
        <label class="flex items-center space-x-3 cursor-pointer select-none">
          <input type="checkbox"
            [(ngModel)]="mostrarOtros"
            (ngModelChange)="onToggleOtros()"
            class="form-checkbox h-5 w-5 text-primary rounded border-gray-300 focus:ring-primary transition-colors">
          <span class="text-[0.95rem] font-medium text-gray-600">Mostrar otros productos</span>
        </label>
      </div>

      <div class="flex flex-col lg:flex-row lg:items-center justify-between gap-4 lg:gap-8 bg-gradient-to-br from-primary to-purple-500 rounded-2xl p-6 lg:p-8 mb-8 text-white shadow-lg">
        <p class="text-xl font-semibold m-0">¿Cómo se ven tus finanzas?</p>
        <div class="flex flex-wrap items-baseline gap-3">
          <span class="text-[0.95rem] font-medium opacity-90">En productos de Ahorro tienes:</span>
          <span class="text-3xl font-extrabold tracking-tight">{{ totalAhorro | currency:'COP':'symbol-narrow':'1.2-2' }}</span>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 items-stretch">
        <ng-container *ngFor="let item of productosVisibles">
          <app-card-deposit-account [item]="item"
            *ngIf="item.accountInformation.productType==='DEPOSIT_ACCOUNT'" class="flex w-full">
          </app-card-deposit-account>

          <app-card-certified-deposit-term [item]="item"
            *ngIf="item.accountInformation.productType==='CERTIFIED_DEPOSIT_TERM'" class="flex w-full">
          </app-card-certified-deposit-term>

          <app-card-credit [item]="item"
            *ngIf="item.accountInformation.productType==='CREDIT'" class="flex w-full">
          </app-card-credit>

          <app-card-credit-card [item]="item"
            *ngIf="item.accountInformation.productType==='CREDIT_CARD'" class="flex w-full">
          </app-card-credit-card>

          <app-card-current-account [item]="item"
            *ngIf="item.accountInformation.productType==='CURRENT_ACCOUNT'" class="flex w-full">
          </app-card-current-account>
        </ng-container>
      </div>

      <div class="mt-14 max-w-[900px] mx-auto">
        <app-footer></app-footer>
      </div>
    </main>

    <footer class="bg-white text-center p-4 text-base border-t border-gray-200 text-gray-400">
      <p class="m-0 font-bold">@Banco</p>
    </footer>
  </div>
</div>
